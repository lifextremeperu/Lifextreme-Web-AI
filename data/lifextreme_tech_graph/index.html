
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifextreme - AI Factory Building 3D</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three"></script>
    <!-- Importante: SpriteText para renderizar el texto en 3D -->
    <script src="https://unpkg.com/three-spritetext"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050510; font-family: 'Inter', sans-serif; }
        #3d-graph { width: 100vw; height: 100vh; cursor: crosshair; }
        
        #title-overlay {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 10;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #334155;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #f8fafc; }
        p { margin: 10px 0 0 0; color: #94a3b8; font-size: 15px; max-width: 400px; line-height: 1.5; }
        .instruction { color: #10b981; font-weight: 600; margin-top: 15px; font-size: 14px; display: block; }
    </style>
</head>
<body>
    <div id="title-overlay">
        <h1>LIFEXTREME AI FACTORY</h1>
        <p>Edificio corporativo de Inteligencia Artificial. Flujo de datos desde los servidores y bases vectoriales (Planta Baja) hacia las APIs y el Frontend (Último Piso).</p>
        <span class="instruction">👉 Arrastra para orbitar el edificio. Haz Scroll para zoom espacial.</span>
    </div>
    
    <div id="3d-graph"></div>

    <script>
        const data = {"nodes": [{"id": "obsidian", "name": "Obsidian Vault", "group": 1, "color": "#bc13fe", "val": 10}, {"id": "supabase", "name": "Supabase VectorDB", "group": 1, "color": "#10b981", "val": 10}, {"id": "ollama", "name": "Ollama AI Server", "group": 1, "color": "#ff073a", "val": 15}, {"id": "dify", "name": "Dify.AI Orchestrator", "group": 2, "color": "#0ea5e9", "val": 8}, {"id": "n8n", "name": "N8N Automation", "group": 2, "color": "#ffbf00", "val": 8}, {"id": "llama3_orq", "name": "Llama-3 (Routing)", "group": 3, "color": "#00f0ff", "val": 6}, {"id": "llama3_ventas", "name": "Llama-3 (Sales)", "group": 3, "color": "#00f0ff", "val": 6}, {"id": "phi3_rag", "name": "Phi-3 (RAG)", "group": 3, "color": "#00ff66", "val": 6}, {"id": "risk_agent", "name": "Llama-3 (Risk Alert)", "group": 3, "color": "#ff003c", "val": 6}, {"id": "fastapi", "name": "FastAPI Core", "group": 4, "color": "#ccff00", "val": 12}, {"id": "quartz", "name": "Quartz 4 Interface", "group": 5, "color": "#ffffff", "val": 10}, {"id": "github", "name": "GitHub Pages", "group": 5, "color": "#ffffff", "val": 8}, {"id": "vercel", "name": "Vercel Edge", "group": 5, "color": "#ffffff", "val": 8}, {"id": "b2b_client", "name": "B2B Partner Web", "group": 5, "color": "#f8fafc", "val": 14}], "links": [{"source": "obsidian", "target": "supabase"}, {"source": "obsidian", "target": "quartz"}, {"source": "ollama", "target": "llama3_orq"}, {"source": "ollama", "target": "llama3_ventas"}, {"source": "ollama", "target": "phi3_rag"}, {"source": "ollama", "target": "risk_agent"}, {"source": "supabase", "target": "phi3_rag"}, {"source": "llama3_orq", "target": "dify"}, {"source": "dify", "target": "llama3_ventas"}, {"source": "dify", "target": "phi3_rag"}, {"source": "dify", "target": "risk_agent"}, {"source": "llama3_ventas", "target": "fastapi"}, {"source": "phi3_rag", "target": "fastapi"}, {"source": "risk_agent", "target": "fastapi"}, {"source": "n8n", "target": "fastapi"}, {"source": "n8n", "target": "obsidian"}, {"source": "fastapi", "target": "quartz"}, {"source": "fastapi", "target": "b2b_client"}, {"source": "quartz", "target": "github"}, {"source": "quartz", "target": "vercel"}]};

        const Graph = ForceGraph3D()
        (document.getElementById('3d-graph'))
            .graphData(data)
            // ESTO CREA LA ESTRUCTURA DE EDIFICIO (Bottom-Up DAG)
            .dagMode('bu')
            .dagLevelDistance(60)
            
            // Reemplazamos las esferas por texto 3D Brillante
            .nodeThreeObject(node => {
                const sprite = new SpriteText(node.name);
                sprite.color = node.color;
                sprite.textHeight = node.val;
                sprite.fontWeight = 'bold';
                sprite.fontFace = 'Inter';
                
                // Efecto de neón: Fondo transparente pero con glow
                sprite.backgroundColor = 'transparent';
                
                return sprite;
            })
            
            // Configuración de conexiones cibernéticas
            .linkColor(() => 'rgba(0, 240, 255, 0.2)') // Cian transparente
            .linkWidth(1)
            .linkDirectionalParticles(link => Math.max(1, Math.floor(Math.random() * 4))) // Flujo de datos
            .linkDirectionalParticleWidth(2.5)
            .linkDirectionalParticleColor(() => '#ffffff') // Paquetes de datos blancos
            .linkDirectionalParticleSpeed(0.008)
            .backgroundColor('#050510') // Vacío profundo
            .showNavInfo(false);
            
        // Rotación orbital lenta de la cámara alrededor del "Rascacielos"
        let angle = 0;
        const distance = 400;
        setInterval(() => {
            Graph.cameraPosition({
                x: distance * Math.sin(angle),
                z: distance * Math.cos(angle)
            });
            angle += Math.PI / 1500;
        }, 30);
    </script>
</body>
</html>
