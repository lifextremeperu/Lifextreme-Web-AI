<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog & Tips | Lifextreme</title>
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Guías, tips y artículos sobre turismo de aventura y deportes extremos en Perú.">
    
    <!-- Tailwind CSS (via CDN para rapidez) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4338ca',
                        secondary: '#ec4899',
                        accent: '#ffbf00'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .logo-font { font-family: 'Montserrat', sans-serif; }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- HEADER SIMPLIFICADO -->
    <header class="glass-header shadow-sm fixed top-0 w-full z-[1000]">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center group">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-xl">
                    <i class="ri-flashlight-fill text-xl"></i>
                </div>
                <div class="logo-font ml-3 leading-none">
                    <span class="text-slate-900 font-normal text-xl tracking-tight">LIFE</span><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary font-black text-xl italic">XTREME</span>
                </div>
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-primary">Inicio</a>
                <a href="blog.html" class="text-primary font-black text-xs uppercase tracking-widest">Blog</a>
            </nav>
        </div>
    </header>

    <main class="pt-32 pb-20 container mx-auto px-6">
        <div class="text-center mb-16">
            <span class="bg-indigo-50 text-primary px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block">Nuevos Artículos</span>
            <h1 class="text-4xl md:text-6xl font-black italic text-slate-900 mb-4">Blog de Aventura</h1>
            <p class="text-slate-500 max-w-2xl mx-auto">Consejos, guías completas y secretos de los expertos para sobrevivir y disfrutar al máximo el turismo extremo en Perú.</p>
        </div>

        <div id="blog-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Los artículos se cargarán aquí por JS -->
            <div class="col-span-full text-center py-20" id="loading-state">
                <i class="ri-loader-4-line text-4xl text-primary animate-spin inline-block"></i>
                <p class="text-slate-400 font-bold mt-4">Sincronizando con el agente IA...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Agregar timestamp (Date.now) a la URL de fetch para evitar que el navegador guarde cache del JSON viejo
                const response = await fetch(`data/blog/index.json?t=${Date.now()}`);
                
                if (!response.ok) throw new Error('No se pudo cargar el índice del blog');
                
                const articles = await response.json();
                const grid = document.getElementById('blog-grid');
                
                if(articles.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20"><p class="text-slate-500">Aún no hay artículos generados. El agente está trabajando...</p></div>';
                    return;
                }
                
                grid.innerHTML = ''; // Limpiar estado de carga
                
                // Mostrar en orden reverso (más nuevos primero)
                articles.reverse().forEach(article => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-3xl p-6 border border-slate-100 shadow-sm hover:shadow-xl transition-all group cursor-pointer flex flex-col h-full relative overflow-hidden";
                    card.onclick = () => window.location.href = `article.html?id=${article.slug}`;
                    
                    // Decidir un icono/color basado en la categoría
                    let icon = 'ri-article-line';
                    let color = 'bg-blue-100 text-blue-600';
                    
                    if(article.category && article.category.toLowerCase().includes('canopy')) { icon = 'ri-windy-line'; color = 'bg-cyan-100 text-cyan-600'; }
                    if(article.category && article.category.toLowerCase().includes('bungee')) { icon = 'ri-arrow-down-double-line'; color = 'bg-red-100 text-red-600'; }
                    
                    card.innerHTML = `
                        <div class="absolute -right-10 -top-10 w-32 h-32 bg-slate-50 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <div class="relative z-10">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-10 h-10 rounded-xl ${color} flex items-center justify-center">
                                    <i class="${icon} text-lg"></i>
                                </div>
                                <div>
                                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">${article.location || 'Perú'}</span>
                                    <p class="text-xs font-bold text-slate-600">${article.category || 'Aventura'}</p>
                                </div>
                            </div>
                            <h3 class="text-xl font-black italic text-slate-900 mb-3 group-hover:text-primary transition-colors">${article.title}</h3>
                            <p class="text-sm text-slate-500 mb-6 flex-grow">${article.summary}</p>
                            
                            <div class="flex items-center justify-between pt-4 border-t border-slate-50 mt-auto">
                                <span class="text-[10px] font-bold text-slate-400"><i class="ri-calendar-line mr-1"></i> ${article.date}</span>
                                <span class="text-[10px] font-black text-primary uppercase tracking-widest flex items-center gap-1 group-hover:translate-x-1 transition-transform">
                                    Leer Guía <i class="ri-arrow-right-line"></i>
                                </span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch(e) {
                console.error(e);
                document.getElementById('loading-state').innerHTML = '<p class="text-red-500">No hay artículos publicados aún.</p>';
            }
        });
    </script>
</body>
</html>
