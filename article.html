<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando artículo... | Lifextreme</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Marked.js para renderizar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4338ca',
                        secondary: '#ec4899',
                        accent: '#ffbf00'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .logo-font { font-family: 'Montserrat', sans-serif; }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        
        /* Estilos Markdown */
        #article-content h1 { font-size: 2.5rem; font-weight: 900; font-style: italic; color: #0f172a; margin-bottom: 1.5rem; line-height: 1.1; }
        #article-content h2 { font-size: 1.875rem; font-weight: 900; color: #1e293b; margin-top: 3rem; margin-bottom: 1rem; }
        #article-content h3 { font-size: 1.25rem; font-weight: 800; color: #334155; margin-top: 2rem; margin-bottom: 0.75rem; }
        #article-content p { font-size: 1.125rem; line-height: 1.8; color: #475569; margin-bottom: 1.5rem; }
        #article-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #475569; }
        #article-content li { margin-bottom: 0.5rem; }
        #article-content strong { color: #0f172a; font-weight: 800; }
        #article-content blockquote { border-left: 4px solid #4338ca; padding-left: 1rem; font-style: italic; color: #64748b; background: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-white min-h-screen">

    <header class="glass-header shadow-sm fixed top-0 w-full z-[1000]">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center group">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-xl">
                    <i class="ri-flashlight-fill text-xl"></i>
                </div>
                <div class="logo-font ml-3 leading-none">
                    <span class="text-slate-900 font-normal text-xl tracking-tight">LIFE</span><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary font-black text-xl italic">XTREME</span>
                </div>
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-primary">Inicio</a>
                <a href="blog.html" class="text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-primary">Blog</a>
            </nav>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <!-- Banner superior -->
        <div class="bg-slate-50 border-b border-slate-100 mb-12">
            <div class="container mx-auto px-6 py-12 max-w-4xl text-center" id="article-header">
                <a href="blog.html" class="text-primary text-[10px] font-black uppercase tracking-widest inline-flex items-center gap-1 mb-8 hover:underline">
                    <i class="ri-arrow-left-line"></i> Volver al Blog
                </a>
                <h1 id="article-title" class="text-4xl md:text-5xl font-black italic text-slate-900 mb-6 loading-pulse bg-slate-200 h-12 w-3/4 mx-auto rounded-xl"></h1>
                <div class="flex items-center justify-center gap-4 text-xs font-bold text-slate-400" id="article-meta">
                    <!-- Meta info inyectada por JS -->
                </div>
            </div>
        </div>

        <article class="container mx-auto px-6 max-w-3xl">
            <div id="article-content">
                <div class="space-y-4 animate-pulse">
                    <div class="h-4 bg-slate-200 rounded w-full"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                    <div class="h-4 bg-slate-200 rounded w-4/6"></div>
                    <br><br>
                    <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                    <div class="h-4 bg-slate-200 rounded w-full"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
            
            <!-- Call to action final -->
            <div class="mt-20 p-8 rounded-3xl bg-slate-900 text-center relative overflow-hidden border border-white/10 hidden" id="article-cta">
                <div class="absolute top-0 right-0 w-64 h-64 bg-primary/20 rounded-full blur-[100px]"></div>
                <h3 class="text-2xl font-black italic text-white mb-3">¿Listo para la aventura?</h3>
                <p class="text-slate-400 mb-6 text-sm">Reserva tu experiencia en Lifextreme con agentes de Inteligencia Artificial que organizan todo por ti.</p>
                <a href="index.html" class="inline-block bg-primary text-white px-8 py-4 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-colors">Ver Destinos</a>
            </div>
        </article>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('id');
            
            if(!slug) {
                document.getElementById('article-content').innerHTML = '<p class="text-red-500 text-center text-xl">Artículo no encontrado.</p>';
                return;
            }

            try {
                // Fetch the article index to get meta info
                // We append a timestamp to ensure fresh data
                const indexResponse = await fetch(`data/blog/index.json?t=${Date.now()}`);
                if (indexResponse.ok) {
                    const articles = await indexResponse.json();
                    const articleMeta = articles.find(a => a.slug === slug);
                    
                    if(articleMeta) {
                        document.title = `${articleMeta.title} | Lifextreme Blog`;
                        document.getElementById('article-title').innerHTML = articleMeta.title;
                        document.getElementById('article-title').classList.remove('loading-pulse', 'bg-slate-200', 'h-12', 'w-3/4', 'mx-auto', 'rounded-xl');
                        
                        document.getElementById('article-meta').innerHTML = `
                            <span class="bg-white border border-slate-200 px-3 py-1 rounded-full text-slate-600"><i class="ri-map-pin-line text-primary"></i> ${articleMeta.location}</span>
                            <span><i class="ri-calendar-line"></i> ${articleMeta.date}</span>
                        `;
                    }
                }

                // Fetch the markdown content
                const mdResponse = await fetch(`data/blog/articles/${slug}.md?t=${Date.now()}`);
                if (!mdResponse.ok) throw new Error('Markdown file not found');
                
                let markdown = await mdResponse.text();
                
                // Si el markdown incluye el título H1 al inicio, lo removemos para que no se duplique con el encabezado de la página
                if(markdown.startsWith('# ')) {
                    markdown = markdown.substring(markdown.indexOf('\n') + 1);
                }

                // Renderizar usando marked
                document.getElementById('article-content').innerHTML = marked.parse(markdown);
                document.getElementById('article-cta').classList.remove('hidden');

            } catch(e) {
                console.error(e);
                document.getElementById('article-title').innerText = "Artículo no disponible";
                document.getElementById('article-title').classList.remove('loading-pulse', 'bg-slate-200', 'h-12', 'w-3/4', 'mx-auto', 'rounded-xl');
                document.getElementById('article-content').innerHTML = `
                    <div class="text-center py-10">
                        <i class="ri-error-warning-line text-5xl text-slate-300 mb-4 inline-block"></i>
                        <p class="text-slate-500 text-lg">Este artículo no existe o el agente aún lo está redactando.</p>
                        <a href="blog.html" class="text-primary font-bold mt-4 inline-block">Volver al blog</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
