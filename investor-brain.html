        const distance = 800;
        setTimeout(() => {
            setInterval(() => {
                try {
                    Graph.cameraPosition({
                        x: distance * Math.sin(angle),
                        z: distance * Math.cos(angle)
                    });
                    angle += Math.PI / 2500;
                } catch(e) {}
            }, 30);
        }, 2000);
    </script>
